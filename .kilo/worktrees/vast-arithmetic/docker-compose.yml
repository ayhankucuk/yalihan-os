version: '3.8'

services:
    # 🐘 PHP Application Server
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: yalihanai-app
        working_dir: /app
        environment:
            - APP_KEY=${APP_KEY}
            - APP_ENV=${APP_ENV:-local}
            - APP_DEBUG=${APP_DEBUG:-true}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - CACHE_DRIVER=redis
            - QUEUE_CONNECTION=redis
            - SESSION_DRIVER=redis
        volumes:
            - .:/app
            - ./docker/php/php.ini:/usr/local/etc/php/php.ini
        ports:
            - '8002:8000'
        depends_on:
            - mysql
            - redis
        networks:
            - yalihanai-network
        command: php artisan serve --host=0.0.0.0

    # 🗄️ MySQL Database
    mysql:
        image: mysql:8.0
        container_name: yalihanai-mysql
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: yalihanai_test
            MYSQL_USER: yalihanai
            MYSQL_PASSWORD: secret
            MYSQL_ALLOW_EMPTY_PASSWORD: 'false'
        volumes:
            - mysql-data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
        ports:
            - '3306:3306'
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
            timeout: 5s
            retries: 5
        networks:
            - yalihanai-network

    # 🔴 Redis Cache & Queue
    redis:
        image: redis:7-alpine
        container_name: yalihanai-redis
        ports:
            - '6379:6379'
        volumes:
            - redis-data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            timeout: 3s
            retries: 5
        networks:
            - yalihanai-network
        command: redis-server --appendonly yes

    # 📧 Mailpit (Email Testing)
    mailpit:
        image: axllent/mailpit:latest
        container_name: yalihanai-mailpit
        ports:
            - '1025:1025'
            - '8025:8025'
        environment:
            - MP_SMTP_AUTH_ACCEPT_ANY=true
            - MP_UI_AUTH_FILE=
        networks:
            - yalihanai-network

    # 📊 PHPMyAdmin (Database Management - Optional)
    phpmyadmin:
        image: phpmyadmin:latest
        container_name: yalihanai-phpmyadmin
        environment:
            PMA_HOST: mysql
            PMA_USER: ${DB_USERNAME:-yalihanai}
            PMA_PASSWORD: ${DB_PASSWORD:-secret}
        ports:
            - '8081:80'
        depends_on:
            - mysql
        networks:
            - yalihanai-network

    # 🔍 Elasticsearch (Optional - for search/logging)
    # Uncomment if needed for full-text search or ELK stack
    # elasticsearch:
    #   image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    #   container_name: yalihanai-elasticsearch
    #   environment:
    #     - discovery.type=single-node
    #     - xpack.security.enabled=false
    #   ports:
    #     - "9200:9200"
    #   volumes:
    #     - elasticsearch-data:/usr/share/elasticsearch/data
    #   networks:
    #     - yalihanai-network

    # 🧪 Node.js Frontend Builder (Optional)
    # Uncomment if you want separate Node container for Vite dev server
    # node:
    #   image: node:18-alpine
    #   container_name: yalihanai-node
    #   working_dir: /app
    #   volumes:
    #     - .:/app
    #   ports:
    #     - "5173:5173"
    #   command: npm run dev
    #   networks:
    #     - yalihanai-network

volumes:
    mysql-data:
        driver: local
    redis-data:
        driver: local
    # elasticsearch-data:
    #   driver: local

networks:
    yalihanai-network:
        driver: bridge
# 📖 Usage:
#
# Build images:
#   docker-compose build
#
# Start containers:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f app
#   docker-compose logs -f mysql
#
# Run migrations:
#   docker-compose exec app php artisan migrate
#
# Run artisan commands:
#   docker-compose exec app php artisan tinker
#
# Stop containers:
#   docker-compose down
#
# Remove volumes (clean slate):
#   docker-compose down -v
#
# Access services:
#   App: http://localhost:8002
#   Mailpit: http://localhost:8025
#   PHPMyAdmin: http://localhost:8081
#   MySQL: localhost:3306
#   Redis: localhost:6379
