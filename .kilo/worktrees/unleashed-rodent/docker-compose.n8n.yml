version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: yalihanemlak_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD must be set}
      - WEBHOOK_URL=${N8N_EXTERNAL_URL:-https://n8n.yalihanemlak.com.tr/}
      - GENERIC_TIMEZONE=Europe/Istanbul
      - N8N_SECURE_COOKIE=true
      - N8N_HOST=${N8N_HOST:-n8n.yalihanemlak.com.tr}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - yalihanemlak_network

volumes:
  n8n_data:
    driver: local

networks:
  yalihanemlak_network:
    driver: bridge
